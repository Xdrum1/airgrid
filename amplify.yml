version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E '^(APP_URL|AUTH_|SES_|ADMIN_|CRON_SECRET|NEXT_PUBLIC_|FAA_|FEDERAL_|LEGISCAN_|SEC_|RESEND_|ALERT_|DATABASE_)' >> .env.production
        - npx prisma generate
        - env | grep '^DATABASE_URL=' > .env
        - npx prisma migrate deploy
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
