version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E '^(CRON_SECRET|NEXT_PUBLIC_|FAA_|FEDERAL_|LEGISCAN_|SEC_|RESEND_|ALERT_|DATABASE_)' >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
