version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E '^(AUTH_|SES_|ADMIN_|CRON_SECRET|NEXT_PUBLIC_|FAA_|FEDERAL_|LEGISCAN_|SEC_|RESEND_|ALERT_|DATABASE_)' >> .env.production
        - npx prisma generate
        - grep "^DATABASE_URL=" .env.production > .env && echo "DATABASE_URL written to .env" || echo "DATABASE_URL not found in .env.production"
        - cat .env | wc -l
        - npx prisma migrate deploy
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
