name: Daily ingestion cron

on:
  schedule:
    # Run every day at 06:00 UTC (1am EST / 10pm PST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Health check + deep warmup
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned $HTTP_CODE — app may be degraded"
          fi
          # Deep warmup: hit the ingest endpoint with ?warmup=true to cold-start
          # the Lambda AND lazy-load the full ingestion module tree (classifier,
          # rules engine, Prisma client, etc.) without running actual ingestion.
          echo "Deep-warming ingest Lambda (loading full module tree)..."
          WARMUP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL/api/ingest?warmup=true")
          echo "Warmup: $WARMUP_CODE"
          if [ "$WARMUP_CODE" != "200" ]; then
            echo "::warning::Warmup returned $WARMUP_CODE — cold start may still be in progress"
          fi
          sleep 3

      - name: Trigger ingestion endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          # Streaming response — collect full output, check last event for result
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL/api/ingest")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Ingestion failed with status $HTTP_CODE"
            exit 1
          fi

          # Check the final SSE event for success
          LAST_EVENT=$(echo "$BODY" | grep "^data:" | tail -1 | sed 's/^data: //')
          echo "Final event: $LAST_EVENT"

          if echo "$LAST_EVENT" | grep -q '"status":"error"'; then
            echo "::error::Ingestion completed with error"
            exit 1
          fi

          if echo "$LAST_EVENT" | grep -q '"status":"complete"'; then
            echo "Ingestion completed successfully"
          else
            echo "::warning::Unexpected final event status"
          fi
