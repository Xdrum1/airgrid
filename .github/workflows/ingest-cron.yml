name: Daily ingestion cron

on:
  schedule:
    # Run every day at 06:00 UTC (1am EST / 10pm PST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          REGULATIONS_GOV_API_KEY: ${{ secrets.REGULATIONS_GOV_API_KEY }}
          SES_ACCESS_KEY_ID: ${{ secrets.SES_ACCESS_KEY_ID }}
          SES_SECRET_ACCESS_KEY: ${{ secrets.SES_SECRET_ACCESS_KEY }}
          SES_REGION: ${{ secrets.SES_REGION }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          ADMIN_NOTIFY_EMAIL: ${{ secrets.ADMIN_NOTIFY_EMAIL }}
          NODE_ENV: production
        run: npx tsx scripts/run-ingestion.ts
