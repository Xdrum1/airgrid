name: Weekly auto-review cron

on:
  schedule:
    # Run every Monday at 08:00 UTC (3am EST / 12am PST)
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-review endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://airindex.io}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL/api/admin/overrides/auto-review")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Auto-review failed with status $HTTP_CODE"
            exit 1
          fi
