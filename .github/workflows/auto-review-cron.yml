name: Daily auto-review cron

on:
  schedule:
    # Run daily at 08:00 UTC (3am EST) — 2 hours after ingestion
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned $HTTP_CODE — app may be degraded"
          fi

      - name: Trigger auto-review endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL/api/admin/overrides/auto-review")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Auto-review failed with status $HTTP_CODE"
            exit 1
          fi
