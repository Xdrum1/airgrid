name: Daily alert notification cron

on:
  schedule:
    # Run daily at 09:00 UTC (4am EST / 5am EDT) — after auto-review
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  alert-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned $HTTP_CODE — app may be degraded"
          fi

      - name: Trigger alert notifications
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL/api/alert-notify")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Alert notification failed with status $HTTP_CODE"
            exit 1
          fi
