name: Daily emerging markets ingestion cron

on:
  schedule:
    # Run every day at 06:30 UTC — 30 min after AirIndex ingest cron
    - cron: "30 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Health check + warmup
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
          echo "Health: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned $HTTP_CODE — app may be degraded"
          fi
          # Warm up the Lambda
          echo "Warming up emerging-ingest Lambda..."
          curl -s -o /dev/null --max-time 15 \
            -H "Authorization: invalid-warmup" \
            "$URL/api/emerging-ingest" || true
          sleep 3

      - name: "Phase 1: Fetch + persist raw records"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 29 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL/api/emerging-ingest")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Emerging ingestion failed with status $HTTP_CODE"
            exit 1
          fi

          if echo "$BODY" | grep -q '"success":true'; then
            echo "Phase 1 complete"
          else
            echo "::error::Unexpected response from ingestion"
            exit 1
          fi

      - name: "Phase 2: Classify records (loop until done)"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          URL="${APP_URL:-https://www.airindex.io}"
          MAX_ITERATIONS=20
          ITERATION=0
          TOTAL_CLASSIFIED=0

          while [ $ITERATION -lt $MAX_ITERATIONS ]; do
            ITERATION=$((ITERATION + 1))

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              --max-time 29 \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$URL/api/emerging-classify")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            echo "[$ITERATION] Status: $HTTP_CODE | Response: $BODY"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Classification call $ITERATION failed with $HTTP_CODE"
              sleep 5
              continue
            fi

            CLASSIFIED=$(echo "$BODY" | grep -o '"classified":[0-9]*' | grep -o '[0-9]*')
            REMAINING=$(echo "$BODY" | grep -o '"remaining":[0-9]*' | grep -o '[0-9]*')
            TOTAL_CLASSIFIED=$((TOTAL_CLASSIFIED + CLASSIFIED))

            if [ "${REMAINING:-0}" -eq 0 ]; then
              echo "All records classified. Total: $TOTAL_CLASSIFIED"
              break
            fi

            echo "$REMAINING remaining, continuing..."
            sleep 3
          done

          if [ $ITERATION -ge $MAX_ITERATIONS ]; then
            echo "::warning::Hit max iterations ($MAX_ITERATIONS), some records may be unclassified"
          fi

          echo "Classification complete: $TOTAL_CLASSIFIED total classified across $ITERATION iterations"
